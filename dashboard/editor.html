<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Tambah Film - Pirate Studio 21</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,300&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/admin.css">
    <style>
    .media-input-wrap { display:flex; gap:8px; align-items:center; }
    .media-input-wrap input { flex:1; margin-bottom:0 !important; }
    .media-upload-btn { flex-shrink:0; background:#2a2a3a; border:1px solid #3a3a4a; color:#aaa; border-radius:8px; padding:10px 12px; cursor:pointer; display:flex; align-items:center; transition:background 0.2s,color 0.2s; }
    .media-upload-btn:hover { background:#e50914; color:#fff; border-color:#e50914; }
    .media-upload-btn:disabled { opacity:0.5; cursor:not-allowed; }

    /* Episode panel */
    .episode-list { display:flex; flex-direction:column; gap:10px; }
    .episode-item { background:#16161f; border:1px solid #2a2a3a; border-radius:10px; padding:12px; position:relative; }
    .episode-item-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
    .episode-num { font-size:0.75rem; font-weight:600; color:var(--admin-accent,#e50914); text-transform:uppercase; letter-spacing:0.05em; }
    .episode-remove { background:none; border:none; color:#555570; cursor:pointer; padding:2px; display:flex; align-items:center; transition:color 0.2s; }
    .episode-remove:hover { color:#e50914; }
    .episode-fields { display:grid; gap:8px; }
    .episode-fields input { background:#0d0d14; border:1px solid #2a2a3a; color:#fff; border-radius:7px; padding:8px 10px; font-size:0.82rem; width:100%; box-sizing:border-box; font-family:inherit; }
    .episode-fields input:focus { outline:none; border-color:var(--admin-accent,#e50914); }
    .episode-fields label { font-size:0.72rem; color:#8888aa; margin-bottom:2px; display:block; }
    .form-section-title svg { vertical-align:middle; margin-right:6px; }
    </style>
</head>
<body>

    <header class="admin-header">
        <a href="index.html" class="admin-logo">
            <span class="logo-red">PIRATE</span><span>STUDIO</span> 21
        </a>
        <div class="admin-header-right">
            <span class="admin-badge">EDITOR</span>
            <a href="index.html" class="admin-link">← Kembali</a>
        </div>
    </header>

    <div class="editor-container">
        <form id="film-form" class="editor-form">
            
            <input type="hidden" id="form-mode" value="add">
            <input type="hidden" id="original-id" value="">

            <!-- INFO DASAR -->
            <div class="form-section">
                <h3 class="form-section-title">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                    Informasi Dasar
                </h3>
                
                <div class="form-row">
                    <div class="form-group flex-2">
                        <label for="film-id">ID Film *</label>
                        <input type="text" id="film-id" name="film-id" required placeholder="contoh: TDK, BB-01, GOT-S01-01">
                        <small>Series: ID-[episode], contoh: BB-01, BB-02</small>
                    </div>
                    <div class="form-group flex-2">
                        <label for="film-type">Tipe *</label>
                        <select id="film-type" required>
                            <option value="movie">Movie</option>
                            <option value="series">Series</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="film-title">Judul *</label>
                    <input type="text" id="film-title" required placeholder="Judul film atau series">
                </div>

                <div class="form-group">
                    <label for="film-slug">Slug</label>
                    <input type="text" id="film-slug" placeholder="judul-film-tahun (auto)">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="film-year">Tahun *</label>
                        <input type="number" id="film-year" required placeholder="2024" min="1900" max="2099">
                    </div>
                    <div class="form-group">
                        <label for="film-rating">Rating</label>
                        <input type="number" id="film-rating" placeholder="8.5" min="0" max="10" step="0.1">
                    </div>
                    <div class="form-group">
                        <label for="film-duration">Durasi</label>
                        <input type="text" id="film-duration" placeholder="120 min / 2 seasons">
                    </div>
                </div>

                <div class="form-group">
                    <label for="film-genre">Genre *</label>
                    <input type="text" id="film-genre" required placeholder="Action, Drama, Sci-Fi">
                </div>
            </div>

            <!-- DETAIL -->
            <div class="form-section">
                <h3 class="form-section-title">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="17" y1="10" x2="3" y2="10"/><line x1="21" y1="6" x2="3" y2="6"/><line x1="21" y1="14" x2="3" y2="14"/><line x1="17" y1="18" x2="3" y2="18"/></svg>
                    Detail Konten
                </h3>
                
                <div class="form-group">
                    <label for="film-synopsis">Sinopsis</label>
                    <textarea id="film-synopsis" rows="4" placeholder="Sinopsis film..."></textarea>
                </div>

                <div class="form-group">
                    <label for="film-director">Sutradara</label>
                    <input type="text" id="film-director" placeholder="Nama sutradara">
                </div>

                <div class="form-group">
                    <label for="film-cast">Pemeran</label>
                    <input type="text" id="film-cast" placeholder="Actor 1, Actor 2">
                </div>
            </div>

            <!-- MEDIA -->
            <div class="form-section">
                <h3 class="form-section-title">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                    Media &amp; URL
                </h3>
                
                <div class="form-group">
                    <label for="film-poster">Poster</label>
                    <div class="media-input-wrap">
                        <input type="text" id="film-poster" placeholder="https://... atau upload gambar">
                        <button type="button" class="media-upload-btn" onclick="uploadMedia('film-poster', 'poster-preview')" title="Upload ke Drive">
                            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                                <polyline points="17 8 12 3 7 8"/>
                                <line x1="12" y1="3" x2="12" y2="15"/>
                            </svg>
                        </button>
                    </div>
                    <div class="preview-box" id="poster-preview">
                        <span class="preview-placeholder">Preview poster akan muncul di sini</span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="film-backdrop">Backdrop</label>
                    <div class="media-input-wrap">
                        <input type="text" id="film-backdrop" placeholder="https://... atau upload gambar">
                        <button type="button" class="media-upload-btn" onclick="uploadMedia('film-backdrop', 'backdrop-preview')" title="Upload ke Drive">
                            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                                <polyline points="17 8 12 3 7 8"/>
                                <line x1="12" y1="3" x2="12" y2="15"/>
                            </svg>
                        </button>
                    </div>
                    <div class="preview-box backdrop-preview" id="backdrop-preview">
                        <span class="preview-placeholder">Preview backdrop akan muncul di sini</span>
                    </div>
                </div>

                <!-- MOVIE: input URL tunggal -->
                <div id="panel-movie">
                    <div class="form-group">
                        <label for="film-embed">URL Embed</label>
                        <input type="text" id="film-embed" placeholder="https://doodstream.com/e/xxxxx">
                    </div>
                    <div class="form-group">
                        <label for="film-download">URL Download</label>
                        <input type="text" id="film-download" placeholder="https://doodstream.com/d/xxxxx">
                    </div>
                    <div class="form-group">
                        <label for="film-mirror">URL Mirror</label>
                        <input type="text" id="film-mirror" placeholder="https://mixdrop.co/e/xxxxx">
                    </div>
                    <div class="form-group">
                        <label for="film-subtitle">URL Subtitle</label>
                        <input type="text" id="film-subtitle" placeholder="https://example.com/sub.vtt">
                    </div>
                </div>

                <!-- SERIES: panel episode dinamis -->
                <div id="panel-series" style="display:none;">
                    <div class="form-group">
                        <label>
                            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                            Daftar Episode
                        </label>
                        <div id="episode-list" class="episode-list"></div>
                        <button type="button" class="admin-btn admin-btn-secondary" style="margin-top:10px;width:100%;" onclick="addEpisode()">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
                            Tambah Episode
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="film-trailer">URL Trailer (YouTube Embed)</label>
                    <input type="text" id="film-trailer" placeholder="https://www.youtube.com/embed/xxxxx">
                </div>
            </div>

            <!-- STATUS -->
            <div class="form-section">
                <h3 class="form-section-title">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                    Status Tampilan
                </h3>
                
                <div class="form-row">
                    <div class="form-group">
                        <label class="checkbox-label">
                            <input type="checkbox" id="film-featured">
                            <span>Featured (Tampil di Hero)</span>
                        </label>
                    </div>
                    <div class="form-group">
                        <label class="checkbox-label">
                            <input type="checkbox" id="film-popular">
                            <span>Popular (Tampil di Film Populer)</span>
                        </label>
                    </div>
                </div>
                <small style="color:#8888aa;">* Featured bisa lebih dari satu — hero akan tampil secara acak.</small>
            </div>

            <!-- TOMBOL AKSI -->
            <div class="form-actions">
                <button type="button" id="btn-publish" class="admin-btn admin-btn-success admin-btn-lg" onclick="submitFilm('publish')">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13"/><path d="M22 2L15 22 11 13 2 9l20-7z"/></svg>
                    Rilis
                </button>
                <button type="button" class="admin-btn admin-btn-secondary admin-btn-lg" onclick="submitFilm('draft')">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                    Simpan Draft
                </button>
                <button type="button" class="admin-btn admin-btn-outline admin-btn-lg" onclick="window.location.href='index.html'">
                    Batal
                </button>
                <button type="button" class="admin-btn admin-btn-danger admin-btn-lg" id="btn-delete" style="display:none;" onclick="deleteFilm()">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
                    Hapus Film
                </button>
            </div>
            
            <div id="draft-status" class="draft-status" style="display:none;"></div>
        </form>
    </div>

    <div class="toast" id="toast"></div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/api.js"></script>
    <script src="js/admin.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            initEditor();
            // Toggle panel movie/series saat type berubah
            var typeEl = document.getElementById('film-type');
            if (typeEl) {
                typeEl.addEventListener('change', toggleSeriesPanel);
                toggleSeriesPanel();
            }
        });

        function toggleSeriesPanel() {
            var type = document.getElementById('film-type').value;
            var isSeries = type === 'series';
            document.getElementById('panel-movie').style.display = isSeries ? 'none' : 'block';
            document.getElementById('panel-series').style.display = isSeries ? 'block' : 'none';
        }
    </script>
</body>
</html>
