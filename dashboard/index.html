<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Pirate Studio 21</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,300&display=swap" rel="stylesheet">
    
    <!-- Dashboard CSS -->
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>

    <!-- HEADER -->
    <header class="admin-header">
        <a href="index.html" class="admin-logo">
            <span class="logo-red">PIRATE</span><span>STUDIO</span> 21
        </a>
        <div class="admin-header-right">
            <span class="admin-badge">DASHBOARD</span>
            <a href="../index.html" class="admin-link" target="_blank">🏠 Lihat Situs</a>
        </div>
    </header>

    <!-- FILTER BAR -->
    <div class="admin-toolbar">
        <div class="toolbar-left">
            <input type="text" id="search-input" class="admin-input" placeholder="Cari film...">
            <select id="filter-type" class="admin-select">
                <option value="all">Semua Tipe</option>
                <option value="movie">Movie</option>
                <option value="series">Series</option>
            </select>
            <select id="filter-genre" class="admin-select">
                <option value="all">Semua Genre</option>
            </select>
        </div>
        <div class="toolbar-right" style="display:flex;gap:8px;flex-shrink:0;align-items:center;flex-wrap:nowrap;">
            <button class="admin-btn admin-btn-primary" style="white-space:nowrap;" onclick="window.location.href='editor.html'">
                + Tambah Film
            </button>
            <a href="galeri.html" class="admin-btn admin-btn-secondary" style="white-space:nowrap;">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
                </svg>
                Galeri
            </a>
        </div>
    </div>

    <!-- STATS -->
    <div class="admin-stats" id="stats-bar">
        <div class="stat-item">
            <span class="stat-number" id="stat-total">0</span>
            <span class="stat-label">Total Film</span>
        </div>
        <div class="stat-item">
            <span class="stat-number" id="stat-movies">0</span>
            <span class="stat-label">Movies</span>
        </div>
        <div class="stat-item">
            <span class="stat-number" id="stat-series">0</span>
            <span class="stat-label">Series</span>
        </div>
    </div>

    <!-- TABLE -->
    <div class="admin-table-wrap">
        <table class="admin-table" id="film-table">
            <thead>
                <tr>
                    <th width="50">#</th>
                    <th width="60">Poster</th>
                    <th>Judul</th>
                    <th>Tipe</th>
                    <th>Tahun</th>
                    <th>Genre</th>
                    <th>Rating</th>
                    <th>Featured</th>
                    <th>Popular</th>
                    <th width="120">Aksi</th>
                </tr>
            </thead>
            <tbody id="table-body">
                <tr>
                    <td colspan="10" class="table-loading">Memuat data...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- PAGINATION -->
    <div class="admin-pagination" id="pagination"></div>

    <!-- TOAST -->
    <div class="toast" id="toast"></div>

    <!-- Scripts -->
    <script src="js/api.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
