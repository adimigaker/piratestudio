<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0a0a0f">
    <title>404 - Halaman Tidak Ditemukan | Pirate Studio 21</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
    .page-404 {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 40px 24px;
        gap: 0;
    }
    .error-icon {
        opacity: 0.15;
        margin-bottom: 32px;
        animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-12px); }
    }
    .error-code {
        font-family: 'Bebas Neue', sans-serif;
        font-size: clamp(80px, 20vw, 160px);
        line-height: 1;
        color: #e50914;
        letter-spacing: 4px;
        margin-bottom: 8px;
    }
    .error-title {
        font-size: clamp(18px, 4vw, 24px);
        font-weight: 600;
        color: #fff;
        margin-bottom: 12px;
    }
    .error-desc {
        font-size: 14px;
        color: rgba(255,255,255,0.5);
        max-width: 320px;
        line-height: 1.6;
        margin-bottom: 36px;
    }
    .error-actions {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        justify-content: center;
    }
    .countdown {
        font-size: 12px;
        color: rgba(255,255,255,0.3);
        margin-top: 24px;
    }
    </style>
</head>
<body>

    <nav class="navbar" id="navbar">
        <a href="/" class="logo" title="Pirate Studio 21 - Home">
            <span class="brand-pirate">PIRATE</span><span class="brand-studio">STUDIO</span>
            <span class="brand-num">21</span>
        </a>
        <div class="search-wrap" id="search-wrap">
            <svg class="search-icon" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
            </svg>
            <input type="text" class="search-input" id="nav-search" placeholder="Cari judul film..." autocomplete="off">
            <div class="search-dropdown" id="search-dropdown"></div>
        </div>
    </nav>

    <main>
        <div class="page-404">

            <!-- Icon film yang "rusak" -->
            <div class="error-icon">
                <svg width="100" height="100" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                    <rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"/>
                    <line x1="7" y1="2" x2="7" y2="22"/>
                    <line x1="17" y1="2" x2="17" y2="22"/>
                    <line x1="2" y1="12" x2="22" y2="12"/>
                    <line x1="2" y1="7" x2="7" y2="7"/>
                    <line x1="2" y1="17" x2="7" y2="17"/>
                    <line x1="17" y1="7" x2="22" y2="7"/>
                    <line x1="17" y1="17" x2="22" y2="17"/>
                </svg>
            </div>

            <div class="error-code">404</div>
            <div class="error-title">Halaman Tidak Ditemukan</div>
            <p class="error-desc">
                Film yang kamu cari sepertinya sudah dihapus, dipindahkan, atau memang tidak pernah ada di sini.
            </p>

            <div class="error-actions">
                <a href="/" class="btn btn-primary">
                    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                    Kembali ke Home
                </a>
                <a href="genre.html" class="btn btn-secondary">
                    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="2" y1="7" x2="7" y2="7"/><line x1="2" y1="17" x2="7" y2="17"/><line x1="17" y1="7" x2="22" y2="7"/><line x1="17" y1="17" x2="22" y2="17"/></svg>
                    Telusuri Genre
                </a>
            </div>

            <p class="countdown" id="countdown">Kembali ke home dalam <span id="count">10</span> detik...</p>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/icons.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script>
    // Countdown redirect
    var count = 10;
    var el = document.getElementById('count');
    var timer = setInterval(function() {
        count--;
        if (el) el.textContent = count;
        if (count <= 0) {
            clearInterval(timer);
            window.location.href = '/';
        }
    }, 1000);

    // Navbar scroll
    var navbar = document.getElementById('navbar');
    if (navbar) {
        window.addEventListener('scroll', function() {
            navbar.classList.toggle('scrolled', window.scrollY > 50);
        });
    }

    // Nav search
    var navInput = document.getElementById('nav-search');
    if (navInput) {
        navInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && this.value.trim()) {
                location.href = 'search.html?q=' + encodeURIComponent(this.value.trim());
            }
        });
    }
    </script>
</body>
</html>
