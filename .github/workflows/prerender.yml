name: Pre-render Film Pages
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Create prerender script
        run: |
          cat > prerender.js << 'EOF'
          const fs = require('fs');
          
          console.log("Fetching films from Supabase...");
          
          const SUPABASE_URL = 'https://eogdtpkiwzlarllnxsrj.supabase.co';
          const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVvZ2R0cGtpd3psYXJsbG54c3JqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwODg0NzMsImV4cCI6MjA4OTY2NDQ3M30.eZPbYTuaDerKL9SOEa4ctkxSlU1PiEAU9l42czgYOyI';
          
          async function main() {
            const response = await fetch(`${SUPABASE_URL}/rest/v1/PirateStudio21_DB?select=*`, {
              headers: {
                'apikey': SUPABASE_ANON_KEY,
                'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
              }
            });
            
            const films = await response.json();
            console.log(`Found ${films.length} films`);
            
            if (!fs.existsSync('film')) {
              fs.mkdirSync('film');
            }
            
            for (const film of films) {
              const html = `<!DOCTYPE html>
          <html>
          <head>
              <meta charset="UTF-8">
              <title>${film.title} (${film.year}) - Streaming ${film.genre} | Pirate Studio 21</title>
              <meta name="description" content="Nonton streaming ${film.title} (${film.year}) subtitle Indonesia. ${film.genre}. ${film.synopsis ? film.synopsis.substring(0, 150) : ''}">
              <meta name="keywords" content="${film.title}, nonton ${film.title}, streaming ${film.title}, download ${film.title}, sinopsis ${film.title}, ps21 ${film.title}">
              <link rel="canonical" href="https://piratestudio.vercel.app/play.html?id=${film.id}">
              <meta http-equiv="refresh" content="0; url=/play.html?id=${film.id}">
          </head>
          <body>
              <h1>${film.title} (${film.year}) - Streaming Film ${film.genre}</h1>
              <p>⭐ Rating: ${film.rating || 'N/A'} | 🎬 Durasi: ${film.duration || 'N/A'} | 👤 Sutradara: ${film.director || 'N/A'}</p>
              <p>${film.synopsis || `Nonton streaming film ${film.title} subtitle Indonesia. ${film.genre} terbaik.`}</p>
              <p><a href="/play.html?id=${film.id}">Klik di sini untuk menonton ${film.title}</a></p>
          </body>
          </html>`;
              
              const filename = `film/${film.id.toLowerCase()}.html`;
              fs.writeFileSync(filename, html);
              console.log("Created:", filename);
            }
            
            let sitemap = `<?xml version="1.0" encoding="UTF-8"?>
          <urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">
          <url><loc>https://piratestudio.vercel.app/</loc></url>`;
            
            for (const film of films) {
              sitemap += `\n<url><loc>https://piratestudio.vercel.app/film/${film.id.toLowerCase()}.html</loc></url>`;
            }
            sitemap += `\n</urlset>`;
            
            fs.writeFileSync('sitemap.xml', sitemap);
            console.log("Sitemap created!");
            console.log("Done!");
          }
          
          main().catch(console.error);
          EOF
      
      - name: Debug - Check script
        run: |
          echo "=== File prerender.js ==="
          cat prerender.js
          echo "=== End of file ==="
      
      - name: Run prerender script
        run: node prerender.js
      
      - name: Debug - Check output
        run: |
          echo "=== Folder film ==="
          ls -la film/ || echo "Folder film tidak ada"
          echo "=== Sitemap ==="
          cat sitemap.xml || echo "Sitemap tidak ada"
      
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config.user.email "github-actions[bot]@users.noreply.github.com"
          git add film/ sitemap.xml
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto generate film pages"
          git push