name: Pre-render Film Pages
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */12 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Create prerender script
        run: |
          cat > prerender.js << 'EOF'
          const fs = require('fs');
          const path = require('path');
          
          const films = [
            { id: 'NTFT', title: 'NTFT', genre: 'Action' },
            { id: 'TTKR', title: 'TTKR', genre: 'Drama' },
            { id: '100M', title: '100 Meters', genre: 'Action' },
            { id: 'AVA26', title: 'AVA26', genre: 'Sci-Fi' },
            { id: 'YNT-01', title: 'YNT-01', genre: 'Adventure' },
            { id: 'KUBO-01', title: 'KUBO-01', genre: 'Animation' }
          ];
          
          if (!fs.existsSync('film')) fs.mkdirSync('film');
          
          for (const film of films) {
            const html = `<!DOCTYPE html>
          <html>
          <head>
            <meta charset="UTF-8">
            <title>${film.title} - Streaming | Pirate Studio 21</title>
            <meta name="description" content="Nonton streaming ${film.title} subtitle Indonesia. Film ${film.genre} terbaru.">
            <meta name="keywords" content="${film.title}, nonton ${film.title}, ps21 ${film.title}">
            <link rel="canonical" href="https://piratestudio.vercel.app/play.html?id=${film.id}">
            <meta http-equiv="refresh" content="0; url=/play.html?id=${film.id}">
          </head>
          <body>Redirecting to <a href="/play.html?id=${film.id}">${film.title}</a></body>
          </html>`;
            
            fs.writeFileSync(`film/${film.id.toLowerCase()}.html`, html);
            console.log(`Created: film/${film.id.toLowerCase()}.html`);
          }
          
          let sitemap = `<?xml version="1.0" encoding="UTF-8"?>
          <urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">
          <url><loc>https://piratestudio.vercel.app/</loc></url>`;
          
          for (const film of films) {
            sitemap += `\n<url><loc>https://piratestudio.vercel.app/film/${film.id.toLowerCase()}.html</loc></url>`;
          }
          sitemap += `\n</urlset>`;
          
          fs.writeFileSync('sitemap.xml', sitemap);
          console.log('Sitemap updated!');
          EOF
      
      - name: Run prerender script
        run: node prerender.js
      
      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add film/ sitemap.xml
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto prerender film pages"
          git push